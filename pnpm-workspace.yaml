allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
shamefullyHoist: true
shellEmulator: true

trustPolicy: no-downgrade
# workbox-build (@vite-pwa/nuxt) - trust compares publish-time evidence across semver lines (known false positives)
trustPolicyExclude:
  - rollup@2.80.0
  - semver@6.3.1
