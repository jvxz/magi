allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
# protection is handled by trustPolicy
minimumReleaseAge: 0
shamefullyHoist: true
shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - rollup@2.80.0
  - semver@6.3.1
  - chokidar@4.0.3
overrides:
  '@nuxt/schema': 4.4.6
  h3: 1.15.11
  tinyexec: 1.2.4
  vite-plugin-pwa: 1.3.0
  workbox-build: 7.4.0
